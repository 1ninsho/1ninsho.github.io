<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページタイトル</title>
    <style>
        /* ページ全体の見栄えを整える設定 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.8;
            margin: 0 auto;
            max-width: 800px;
            padding: 20px;
            color: #333;
            background-color: #fcfcfc;
        }
        /* 言語切り替え表記用 */
        .lang-switch {
            text-align: right;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
        }
        /* 各見出しのデザイン */
        h1 {
            font-size: 2.2em;
            border-bottom: 3px solid #333;
            padding-bottom: 10px;
            margin-top: 20px;
        }
        h2 {
            font-size: 1.8em;
            border-bottom: 1px solid #ccc;
            margin-top: 50px;
            padding-bottom: 5px;
        }
        h3 {
            font-size: 1.4em;
            border-left: 5px solid #555;
            padding-left: 10px;
            margin-top: 40px;
        }
        h4 {
            font-size: 1.1em;
            color: #444;
            margin-top: 30px;
        }
        /* 文章の改行をそのまま表示するための設定 */
        p {
            white-space: pre-wrap;
            margin-bottom: 2em;
        }
        /* YouTube動画用のダミー枠 */
        .video-placeholder {
            background-color: #eee;
            border: 2px dashed #aaa;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
            color: #666;
            font-weight: bold;
            border-radius: 5px;
        }
        /* YouTube動画をスマホ対応（レスポンシブ）にする設定 */
        iframe {
            width: 100%;
            max-width: 560px;
            aspect-ratio: 16 / 9;
            height: auto;
            display: block;       /* 前後に余計な隙間を作らないための設定 */
            margin: 15px 0;       /* 上下に少し隙間を空ける */
            border: none;         /* 動画の周りの黒い線を消す */
        }
        /* フッター（戻るリンク・前後ナビゲーション）の装飾 */
        footer {
            margin-top: 60px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
        /* 前後のリンクを左右に配置するための設定（テーブルレイアウトによる互換性確保） */
        .page-navigation {
            display: table;
            width: 100%;
            margin-bottom: 20px;
        }
        .nav-prev {
            display: table-cell;
            text-align: left;
            width: 50%;
        }
        .nav-next {
            display: table-cell;
            text-align: right;
            width: 50%;
        }
        .nav-home {
            text-align: center;
            margin-top: 15px;
        }
        footer a {
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="lang-switch">日本語/ENG(WIP)</div>

    <h1>タイトル</h1>

    <h2>（大見出し）</h2>

    <h3>（中見出し）</h3>

    <h4>（小見出し）</h4>
    
<iframe src="https://www.youtube.com/embed/動画ID?start=開始秒&end=終了秒" 
  title="YouTube video player" frameborder="0" 
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
  allowfullscreen>
</iframe>
    
    <p>ここに本文のテキストを入力します。
改行した文章はそのままWebページ上でも改行されて表示されます。</p>

    <footer>
        <div class="page-navigation">
            <div class="nav-prev"><a href="【前のファイル名】.html">← Prev.</a></div>
            <div class="nav-next"><a href="【次のファイル名】.html">Next →</a></div>
        </div>
        <div class="nav-home">
            <a href="index.html">トップページ</a>
        </div>
    </footer>

</body>
</html>



    <script>
        // ページ読み込み時に実行
        document.addEventListener("DOMContentLoaded", function() {
            const iframes = document.querySelectorAll('iframe[src*="youtube.com/embed"]');
            
            iframes.forEach(function(iframe, index) {
                // 1. APIで操作するためのIDを自動で付ける
                if (!iframe.id) iframe.id = 'yt-player-' + index;
                
                // 2. JSから操作するための必須パラメータ(enablejsapi=1)をURLに自動追加
                if (!iframe.src.includes('enablejsapi=1')) {
                    iframe.src += (iframe.src.includes('?') ? '&' : '?') + 'enablejsapi=1';
                }
            });

            // 3. YouTubeの操作プログラム（API）を読み込む
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        });

        // YouTube APIの準備が整ったら自動で呼ばれる関数
        function onYouTubeIframeAPIReady() {
            const iframes = document.querySelectorAll('iframe[src*="youtube.com/embed"]');
            
            iframes.forEach(function(iframe) {
                // iframeのURLから「start=〇〇」の数字を抜き出す（無ければ0秒とする）
                const startMatch = iframe.src.match(/[?&]start=(\d+)/);
                const startSec = startMatch ? parseInt(startMatch[1], 10) : 0;

                // プレイヤーをプログラムで監視する設定
                new YT.Player(iframe.id, {
                    events: {
                        'onStateChange': function(event) {
                            // 動画が指定した終了時間(end)に到達して「再生終了(ENDED)」になった瞬間
                            if (event.data === YT.PlayerState.ENDED) {
                                // 開始秒数に瞬時に巻き戻す
                                event.target.seekTo(startSec, true);
                                // 一時停止して、ユーザーがもう一度再生ボタンを押すのを待つ
                                event.target.pauseVideo(); 
                                
                                // 💡 もし「自動でずっとループ再生させ続けたい」場合は、
                                // 上の pauseVideo() を消して event.target.playVideo(); に書き換えてください。
                            }
                        }
                    }
                });
            });
        }
    </script>
    </body>
</html>
